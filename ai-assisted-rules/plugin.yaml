apiVersion: plugger/v1
name: ai-assisted-rules
version: 0.2.0
image: ai-assisted-rules:latest

schedule:
  mode: daemon

env:
  - name: POLL_INTERVAL
    required: false
    default: "3600"
  - name: LOOKBACK_HOURS
    required: false
    default: "24"
  - name: MAX_RESULTS
    required: false
    default: "10000"
  - name: PCE_TLS_SKIP_VERIFY
    required: false
    default: "true"
  - name: AI_PROVIDER
    required: false
    default: ""
  - name: AI_API_KEY
    required: false
    default: ""
    secret: true
  - name: AI_MODEL
    required: false
    default: ""
  - name: AI_BASE_URL
    required: false
    default: ""

health:
  endpoint: /healthz
  port: 8080
  interval: 30s
  timeout: 5s
  retries: 3

resources:
  memoryLimit: 256m
  cpuLimit: "0.5"
