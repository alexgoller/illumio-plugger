plugger: v1

ports:
  - port: 8080
    protocol: tcp
    name: dashboard
    description: Traffic analysis dashboard
    type: ui
    path: /

config:
  - name: POLL_INTERVAL
    description: Seconds between traffic polls
    required: false
    type: int
    default: "3600"
  - name: LOOKBACK_HOURS
    description: Hours of traffic history to query
    required: false
    type: int
    default: "24"
  - name: MAX_RESULTS
    description: Maximum number of flows to retrieve
    required: false
    type: int
    default: "10000"
  - name: PCE_TLS_SKIP_VERIFY
    description: Skip TLS certificate verification
    required: false
    type: bool
    default: "true"

info:
  title: Traffic Reporter
  description: PCE traffic flow analysis with top talkers, blocked connections, and service breakdown
  author: Illumio
  license: Apache-2.0
