apiVersion: plugger/v1
name: my-shell-plugin
version: 0.1.0
image: my-shell-plugin:latest

schedule:
  mode: daemon

env:
  - name: MY_PLUGIN_SETTING
    required: false
    default: "default-value"
  - name: POLL_INTERVAL
    required: false
    default: "60"

resources:
  memoryLimit: 128m
  cpuLimit: "0.25"
