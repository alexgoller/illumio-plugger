plugger: v1

ports:
  - port: 8080
    protocol: tcp
    name: dashboard
    description: AI-powered blocked traffic analysis, rule suggestions, and auto-provisioning
    type: ui
    path: /

config:
  - name: POLL_INTERVAL
    description: Seconds between analysis runs
    required: false
    type: int
    default: "300"
  - name: LOOKBACK_HOURS
    description: Hours of traffic to analyze
    required: false
    type: int
    default: "24"
  - name: MAX_RESULTS
    description: Maximum flows to query
    required: false
    type: int
    default: "10000"
  - name: PCE_TLS_SKIP_VERIFY
    description: Skip TLS certificate verification
    required: false
    type: bool
    default: "true"
  - name: AI_PROVIDER
    description: LLM provider for AI Suggested analysis (anthropic, openai, ollama)
    required: false
    type: string
    default: ""
  - name: AI_API_KEY
    description: API key for the LLM provider
    required: false
    type: secret
  - name: AI_MODEL
    description: Model to use (e.g. claude-sonnet-4-20250514, gpt-4o, llama3)
    required: false
    type: string
    default: ""
  - name: AI_BASE_URL
    description: Base URL for Ollama or custom API endpoints
    required: false
    type: string
    default: ""

volumes:
  - path: /data
    description: Report output directory
    required: false

info:
  title: Stale Rules Checker
  description: AI-powered blocked traffic analysis — finds rule gaps, suggests policies with LLM reasoning, and provisions to PCE draft with one click
  author: Illumio
  license: Apache-2.0
