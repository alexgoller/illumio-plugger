apiVersion: plugger/v1
name: rule-scheduler
version: 0.1.0
image: rule-scheduler:latest

schedule:
  mode: daemon

env:
  - name: CHECK_INTERVAL
    required: false
    default: "60"
  - name: TZ
    required: false
    default: "UTC"
  - name: PCE_TLS_SKIP_VERIFY
    required: false
    default: "true"

health:
  endpoint: /healthz
  port: 8080
  interval: 30s
  timeout: 5s
  retries: 3

resources:
  memoryLimit: 128m
  cpuLimit: "0.25"
