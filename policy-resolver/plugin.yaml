apiVersion: plugger/v1
name: policy-resolver
version: 0.1.0
image: plugger-policy-resolver:latest

schedule:
  mode: daemon

env:
  - name: POLL_INTERVAL
    required: false
    default: "3600"
  - name: RESOLVE_DRAFT
    required: false
    default: "false"
  - name: PCE_TLS_SKIP_VERIFY
    required: false
    default: "true"

health:
  endpoint: /healthz
  port: 8080
  interval: 30s
  timeout: 5s
  retries: 3

resources:
  memoryLimit: 256m
  cpuLimit: "0.5"
