apiVersion: plugger/v1
name: policy-diff
version: 0.1.0
image: policy-diff:latest

schedule:
  mode: daemon

env:
  - name: POLL_INTERVAL
    required: false
    default: "300"
  - name: PCE_TLS_SKIP_VERIFY
    required: false
    default: "true"

health:
  endpoint: /healthz
  port: 8080
  interval: 30s
  timeout: 5s
  retries: 3

resources:
  memoryLimit: 128m
  cpuLimit: "0.25"
