plugger: v1

ports:
  - port: 8080
    protocol: tcp
    name: dashboard
    description: Stale workload discovery dashboard
    type: ui
    path: /

config:
  - name: POLL_INTERVAL
    description: Seconds between checks
    required: false
    type: int
    default: "3600"
  - name: STALE_DAYS
    description: Days without heartbeat to consider stale
    required: false
    type: int
    default: "7"
  - name: OFFLINE_HOURS
    description: Hours offline to flag
    required: false
    type: int
    default: "24"
  - name: CHECK_TRAFFIC
    description: Also check for workloads with zero traffic
    required: false
    type: bool
    default: "true"
  - name: TRAFFIC_LOOKBACK_HOURS
    description: Hours of traffic to check (default 7 days)
    required: false
    type: int
    default: "168"
  - name: PCE_TLS_SKIP_VERIFY
    description: Skip TLS certificate verification
    required: false
    type: bool
    default: "true"
  - name: ENABLE_CLEANUP
    description: Enable unpair/delete actions (default disabled for safety)
    required: false
    type: bool
    default: "false"

info:
  title: Stale Workloads
  description: Discover offline, unresponsive, and trafficless workloads — grouped by app|env with severity and cleanup recommendations
  author: Illumio
  license: Apache-2.0
